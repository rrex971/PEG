<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEG Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="../PEG_logo.png" alt="PEG" class="header-logo" />
        <h1>ADMIN PANEL</h1>
    </header>
    <main>
        <!-- Match Selection -->
        <section class="card">
            <h2>Match Selection</h2>
            
            <div class="form-group">
                <label for="round-select">Round:</label>
                <select id="round-select">
                    <option value="ROUND OF 16">ROUND OF 16</option>
                    <option value="QUARTERFINALS">QUARTERFINALS</option>
                    <option value="SEMIFINALS">SEMIFINALS</option>
                    <option value="FINALS">FINALS</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="match-select">Match:</label>
                <select id="match-select">
                    <option value="0">Match 1</option>
                    <option value="1">Match 2</option>
                    <option value="2">Match 3</option>
                    <option value="3">Match 4</option>
                </select>
            </div>
            
            <div class="team-display">
                <div class="team-left">
                    <span class="team-label">Team Left:</span>
                    <span id="team-left-name" class="team-name">No match selected</span>
                </div>
                <div class="team-right">
                    <span class="team-label">Team Right:</span>
                    <span id="team-right-name" class="team-name">No match selected</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="swap-teams-btn">Swap Teams</button>
                <button id="set-match-btn">Set Match</button>
            </div>
        </section>
        
        <!-- Pick/Ban -->
        <section class="card">
            <h2>Picks & Bans</h2>
            
            <div class="mappool-grid" id="mappool-grid">
                <!-- Map cards will be generated by JavaScript -->
            </div>
            
            <div class="button-group">
                <button id="undo-btn">Undo</button>
                <button id="clear-all-btn">Clear All</button>
            </div>
        </section>
        
        <!-- Picks Log -->
        <section class="card">
            <h2>Action Log</h2>
            
            <div id="picks-log-content" class="log-content">
                <!-- Log entries will be added here -->
            </div>
        </section>
    </main>
    
    <!-- Map Action Popup -->
    <div id="map-action-popup" class="map-action-popup" style="display: none;">
        <div class="popup-title">Map Action</div>
        <div class="popup-actions" id="popup-actions-standard">
            <button class="popup-btn pick" data-action="picked" data-player="1">Pick (Team 1)</button>
            <button class="popup-btn pick" data-action="picked" data-player="2">Pick (Team 2)</button>
            <button class="popup-btn ban" data-action="banned" data-player="1">Ban (Team 1)</button>
            <button class="popup-btn ban" data-action="banned" data-player="2">Ban (Team 2)</button>
            <button class="popup-btn protect" data-action="protected" data-player="1">Protect (Team 1)</button>
            <button class="popup-btn protect" data-action="protected" data-player="2">Protect (Team 2)</button>
        </div>
        <div class="popup-actions" id="popup-actions-tb" style="display: none;">
            <button class="popup-btn pick" data-action="picked" data-player="0">Pick TB</button>
        </div>
        <button class="popup-close">✕</button>
    </div>
    
    <script src="../shared/sheets.js"></script>
    <script src="script.js"></script>
</body>
</html>
