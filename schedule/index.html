<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main">
        <!-- Header (compact) -->
        <div id="header">
            <img src="../PEG_logo.png" id="logo" alt="PEG Logo">
            <div id="round">SCHEDULE</div>
        </div>
        
        <!-- Schedule Content -->
        <div class="schedule-content">
            <h2 class="round-title" id="round-title">ROUND OF 16</h2>
            <div class="schedule-container">
                <div class="matches-grid" id="matches-grid">
                    <!-- Match cards will be inserted here by JavaScript -->
                </div>
            </div>
        </div>
    </div>
    <script src="../shared/sheets.js"></script>
    <script src="script.js"></script>
</body>
</html>
